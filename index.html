<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>StránkyProVás – Leads Dashboard</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #181b22;
    --panel-2: #1f232c;
    --border: rgba(255,255,255,.08);
    --text: #e8eaf0;
    --muted: #8a90a0;
    --accent: #6aa5ff;
    --hot: #ff5c5c;
    --warm: #ff9f43;
    --cold: #4dd0e1;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, system-ui, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    padding: 1.5rem;
  }
  .container { max-width: 1600px; margin: 0 auto; }
  h1 { font-size: 1.75rem; margin-bottom: .25rem; }
  h1 .accent { color: var(--accent); }
  .subtitle { color: var(--muted); margin-bottom: 1.5rem; }

  /* Password gate */
  .gate {
    min-height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .gate-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2.5rem;
    max-width: 400px;
    width: 100%;
    text-align: center;
  }
  .gate-box h2 { margin-bottom: .5rem; font-size: 1.3rem; }
  .gate-box p { color: var(--muted); margin-bottom: 1.5rem; font-size: .9rem; }
  .gate-box input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: .75rem 1rem;
    border-radius: 8px;
    font-size: 1rem;
    margin-bottom: 1rem;
  }
  .gate-box button {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: 0;
    padding: .75rem 1rem;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1rem;
    font-weight: 600;
  }
  .gate-error { color: var(--hot); font-size: .85rem; margin-top: .75rem; min-height: 1.2em; }

  /* Dashboard (hidden until unlocked) */
  #dashboard { display: none; }
  #dashboard.unlocked { display: block; }

  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 0.75rem;
    margin-bottom: 1.5rem;
  }
  .stat { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; }
  .stat .num { font-size: 1.75rem; font-weight: 700; display: block; }
  .stat .label { color: var(--muted); font-size: .8rem; text-transform: uppercase; letter-spacing: .04em; }
  .stat.hot .num { color: var(--hot); }
  .stat.warm .num { color: var(--warm); }
  .stat.cold .num { color: var(--cold); }

  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 1rem;
    align-items: center;
  }
  .filter-btn {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: .45rem .9rem;
    border-radius: 8px;
    cursor: pointer;
    font-size: .85rem;
  }
  .filter-btn:hover { background: var(--panel-2); }
  .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .search {
    flex: 1;
    min-width: 200px;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: .5rem .9rem;
    border-radius: 8px;
    font-size: .9rem;
  }
  .search::placeholder { color: var(--muted); }
  .logout {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: .45rem .9rem;
    border-radius: 8px;
    cursor: pointer;
    font-size: .8rem;
  }
  .logout:hover { color: var(--text); }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 1rem; }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-left: 4px solid var(--border);
    border-radius: 10px;
    padding: 1.25rem;
    display: flex;
    flex-direction: column;
    gap: .5rem;
  }
  .card.hot    { border-left-color: var(--hot); }
  .card.warm   { border-left-color: var(--warm); }
  .card.cold   { border-left-color: var(--cold); }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 1rem;
    margin-bottom: .25rem;
  }
  .card-title { font-size: 1.05rem; font-weight: 700; line-height: 1.3; }
  .heat-badge {
    font-size: .7rem;
    font-weight: 700;
    text-transform: uppercase;
    padding: .25rem .55rem;
    border-radius: 4px;
    letter-spacing: .05em;
    white-space: nowrap;
  }
  .heat-hot   { background: rgba(255,92,92,.15); color: var(--hot); }
  .heat-warm  { background: rgba(255,159,67,.15); color: var(--warm); }
  .heat-cold  { background: rgba(77,208,225,.15); color: var(--cold); }

  .meta-row {
    display: flex;
    flex-wrap: wrap;
    gap: .5rem .9rem;
    font-size: .82rem;
    color: var(--muted);
    margin-bottom: .5rem;
  }
  .meta-row span::before {
    content: "";
    display: inline-block;
    width: 4px;
    height: 4px;
    background: var(--muted);
    border-radius: 50%;
    margin-right: .45rem;
    vertical-align: middle;
  }

  .phase {
    display: inline-block;
    font-size: .72rem;
    font-weight: 600;
    padding: .22rem .5rem;
    border-radius: 4px;
    background: var(--panel-2);
    color: var(--text);
    text-transform: uppercase;
    letter-spacing: .04em;
  }

  .section-label {
    font-size: .7rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .08em;
    margin-top: .75rem;
    margin-bottom: .25rem;
  }
  .section-body { font-size: .9rem; color: var(--text); }
  .section-body.muted { color: var(--muted); }

  .contact-info {
    display: flex;
    flex-direction: column;
    gap: .2rem;
    font-size: .85rem;
    margin-top: .25rem;
  }
  .contact-info a { color: var(--accent); text-decoration: none; }
  .contact-info a:hover { text-decoration: underline; }

  .price-badge {
    display: inline-block;
    font-weight: 700;
    color: #22c55e;
    background: rgba(34,197,94,.1);
    padding: .3rem .6rem;
    border-radius: 5px;
    font-size: .88rem;
  }

  .next-action {
    background: rgba(106,165,255,.08);
    border-left: 3px solid var(--accent);
    padding: .6rem .75rem;
    border-radius: 4px;
    margin-top: .5rem;
    font-size: .88rem;
  }
  .next-action strong {
    display: block; font-size: .72rem; color: var(--accent);
    text-transform: uppercase; letter-spacing: .06em; margin-bottom: .2rem;
  }

  .demo-link {
    color: var(--accent);
    font-size: .82rem;
    text-decoration: none;
    word-break: break-all;
  }
  .demo-link:hover { text-decoration: underline; }

  .footer-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: auto;
    padding-top: .75rem;
    border-top: 1px solid var(--border);
    font-size: .75rem;
    color: var(--muted);
  }

  @media (max-width: 600px) {
    body { padding: .75rem; }
    .grid { grid-template-columns: 1fr; }
    h1 { font-size: 1.4rem; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- Password gate -->
  <div class="gate" id="gate">
    <div class="gate-box">
      <h2>🔒 Leads Dashboard</h2>
      <p>StránkyProVás – interní přehled leadů</p>
      <form id="gate-form">
        <input type="password" id="password" placeholder="Heslo" autofocus autocomplete="current-password">
        <button type="submit">Odemknout</button>
        <div class="gate-error" id="gate-error"></div>
      </form>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard">
    <h1>Leads Dashboard <span class="accent">·</span>
      <span style="color:var(--muted);font-weight:400;font-size:1rem">StránkyProVás</span></h1>
    <p class="subtitle" id="last-updated">Načítá se…</p>

    <div class="stats" id="stats"></div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">Všichni</button>
      <button class="filter-btn" data-filter="hot">🔥 Horké</button>
      <button class="filter-btn" data-filter="warm">🟠 Teplé</button>
      <button class="filter-btn" data-filter="cold">🔵 Studené</button>
      <button class="filter-btn" data-filter="realizace">💼 V realizaci</button>
      <button class="filter-btn" data-filter="hovor_naplánovaný">📞 Hovor naplánovaný</button>
      <button class="filter-btn" data-filter="odloženo">📅 Odloženo</button>
      <input type="text" class="search" id="search" placeholder="Hledat (jméno, email, město, průmysl, požadavek...)">
      <button class="logout" id="logout">Zamknout</button>
    </div>

    <div class="grid" id="grid"></div>
  </div>

</div>

<script>
const PHASE_LABELS = {
  "realizace": "💼 V realizaci",
  "čeká_schválení": "🟡 Čeká na schválení",
  "jednání": "🔵 V jednání",
  "hovor_naplánovaný": "📞 Hovor naplánovaný",
  "čeká_podklady": "📥 Čeká na podklady",
  "follow_up": "🔁 Follow-up odeslán",
  "odloženo": "📅 Odloženo",
  "čeká": "⏳ Čeká",
};
const HEAT_LABELS = { hot: "🔥 HOT", warm: "🟠 WARM", cold: "🔵 COLD" };

// --- Crypto helpers (AES-GCM + PBKDF2) ---
async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const material = await crypto.subtle.importKey(
    "raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]
  );
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt, iterations: 100000, hash: "SHA-256" },
    material,
    { name: "AES-GCM", length: 256 },
    false, ["decrypt"]
  );
}

function b64decode(str) {
  const bin = atob(str);
  const out = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}

async function decryptData(password, encBlob) {
  const data = b64decode(encBlob.trim());
  const salt = data.slice(0, 16);
  const iv = data.slice(16, 28);
  const cipher = data.slice(28);
  const key = await deriveKey(password, salt);
  const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, cipher);
  return JSON.parse(new TextDecoder().decode(plain));
}

// --- Unlock flow ---
async function tryUnlock(password) {
  const err = document.getElementById('gate-error');
  err.textContent = "Rozšifrovávám...";
  try {
    const res = await fetch('leads.enc');
    if (!res.ok) throw new Error("Soubor s daty se nepodařilo načíst.");
    const encBlob = await res.text();
    const leads = await decryptData(password, encBlob);
    window._leads = leads;
    sessionStorage.setItem('spv_pass', password);
    document.getElementById('gate').style.display = 'none';
    document.getElementById('dashboard').classList.add('unlocked');
    render();
  } catch (e) {
    err.textContent = "Špatné heslo.";
  }
}

document.getElementById('gate-form').addEventListener('submit', (e) => {
  e.preventDefault();
  const pw = document.getElementById('password').value;
  tryUnlock(pw);
});

document.getElementById('logout').addEventListener('click', () => {
  sessionStorage.removeItem('spv_pass');
  location.reload();
});

// Auto-unlock if password is in sessionStorage
const savedPw = sessionStorage.getItem('spv_pass');
if (savedPw) tryUnlock(savedPw);

// --- Render ---
function render() {
  const active = document.querySelector('.filter-btn.active').dataset.filter;
  const q = document.getElementById('search').value.trim().toLowerCase();

  let list = window._leads;
  if (active !== 'all') {
    list = list.filter(l => l.heat === active || l.phase === active);
  }
  if (q) {
    list = list.filter(l => JSON.stringify(l).toLowerCase().includes(q));
  }
  const heatOrder = { hot: 0, warm: 1, cold: 2 };
  list.sort((a,b) => heatOrder[a.heat] - heatOrder[b.heat] || a.id - b.id);

  const stats = {
    all: window._leads.length,
    hot: window._leads.filter(l => l.heat === 'hot').length,
    warm: window._leads.filter(l => l.heat === 'warm').length,
    cold: window._leads.filter(l => l.heat === 'cold').length,
    realizace: window._leads.filter(l => l.phase === 'realizace').length,
    hovor: window._leads.filter(l => l.phase === 'hovor_naplánovaný').length,
  };
  document.getElementById('stats').innerHTML = `
    <div class="stat"><span class="num">${stats.all}</span><span class="label">Celkem leadů</span></div>
    <div class="stat hot"><span class="num">${stats.hot}</span><span class="label">🔥 Horké</span></div>
    <div class="stat warm"><span class="num">${stats.warm}</span><span class="label">🟠 Teplé</span></div>
    <div class="stat cold"><span class="num">${stats.cold}</span><span class="label">🔵 Studené</span></div>
    <div class="stat"><span class="num">${stats.realizace}</span><span class="label">💼 V realizaci</span></div>
    <div class="stat"><span class="num">${stats.hovor}</span><span class="label">📞 Hovor naplánovaný</span></div>
  `;

  document.getElementById('last-updated').textContent =
    `${list.length} z ${window._leads.length} leadů · aktualizováno ${new Date().toLocaleDateString('cs-CZ')}`;

  document.getElementById('grid').innerHTML = list.map(l => `
    <div class="card ${l.heat}">
      <div class="card-header">
        <div>
          <div class="card-title">${l.name}</div>
          ${l.contact && l.contact !== '—' ? `<div style="color:var(--muted);font-size:.85rem;margin-top:.15rem">${l.contact}</div>` : ''}
        </div>
        <span class="heat-badge heat-${l.heat}">${HEAT_LABELS[l.heat]}</span>
      </div>

      <div class="meta-row">
        ${l.city && l.city !== '—' ? `<span>📍 ${l.city}</span>` : ''}
        <span>🏷️ ${l.industry}</span>
      </div>

      <span class="phase">${PHASE_LABELS[l.phase] || l.phase}</span>

      <div class="contact-info">
        ${l.email ? `<div>✉️ <a href="mailto:${l.email.split(',')[0].trim()}">${l.email}</a></div>` : ''}
        ${l.phone && l.phone !== '—' ? `<div>📞 <a href="tel:${l.phone.replace(/\\s/g,'')}">${l.phone}</a></div>` : ''}
      </div>

      ${l.price && l.price !== '—' ? `<div style="margin-top:.3rem"><span class="price-badge">💰 ${l.price}</span></div>` : ''}
      ${l.price_note ? `<div class="section-body muted" style="font-size:.78rem;margin-top:.25rem;font-style:italic">${l.price_note}</div>` : ''}

      ${l.demo && l.demo !== '—' ? `
        <div class="section-label">Demo web</div>
        <a href="${l.demo}" target="_blank" class="demo-link">${l.demo}</a>
      ` : ''}

      <div class="section-label">Požadavek</div>
      <div class="section-body">${l.request || '—'}</div>

      <div class="section-label">Stav jednání</div>
      <div class="section-body">${l.status || '—'}</div>

      ${l.next_action ? `
        <div class="next-action">
          <strong>Další krok</strong>
          ${l.next_action}
        </div>
      ` : ''}

      ${l.notes ? `
        <div class="section-label">Poznámka</div>
        <div class="section-body muted">${l.notes}</div>
      ` : ''}

      <div class="footer-bar">
        <span>#${l.id}</span>
        <span>Poslední kontakt: ${l.last_contact}</span>
      </div>
    </div>
  `).join('') || '<p style="color:var(--muted);grid-column:1/-1;text-align:center;padding:2rem">Žádné leady neodpovídají filtru.</p>';
}

// Filter handlers
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});
document.getElementById('search').addEventListener('input', () => {
  if (window._leads) render();
});
</script>
</body>
</html>
